<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TripMind - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                        "surface-dim": "#0e0e13",
                        "tertiary-fixed-dim": "#00d4ec",
                        "error-dim": "#d73357",
                        "secondary-container": "#293ca0",
                        "on-primary-fixed-variant": "#32008a",
                        "outline-variant": "#48474d",
                        "on-surface-variant": "#acaab1",
                        "on-tertiary-fixed": "#003840",
                        "surface-container-high": "#1f1f26",
                        "secondary": "#8596ff",
                        "secondary-fixed-dim": "#b7c0ff",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        body {
            font-family: 'Manrope', sans-serif;
            background-color: #0e0e13;
            color: #f6f2fa;
        }
        h1, h2, h3 {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .glass-card {
            background: rgba(37, 37, 44, 0.6);
            backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background min-h-screen flex flex-col justify-center items-center p-6 overflow-hidden">
<!-- Decorative Background Elements -->
<div class="fixed top-[-10%] left-[-10%] w-[60%] h-[60%] bg-primary/10 rounded-full blur-[120px] pointer-events-none"></div>
<div class="fixed bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-secondary/5 rounded-full blur-[100px] pointer-events-none"></div>
<!-- Main Content Container -->
<main class="w-full max-w-md flex flex-col items-center relative z-10">
<!-- Brand Identity Section -->
<div class="mb-12 text-center">
<div class="inline-flex items-center justify-center p-4 rounded-2xl bg-surface-container shadow-[0_16px_32px_rgba(182,160,255,0.15)] mb-6">
<span class="material-symbols-outlined text-4xl text-primary" style="font-variation-settings: 'FILL' 1;">psychology</span>
</div>
<h1 class="text-3xl font-black tracking-tight bg-gradient-to-r from-primary to-secondary bg-clip-text text-transparent">
                TripMind
            </h1>
</div>
<!-- Welcome Header -->
<div class="w-full text-left mb-10">
<h2 class="text-4xl font-extrabold text-on-surface mb-2">Welcome back</h2>
<p class="text-on-surface-variant font-medium">Your next adventure starts here.</p>
</div>
<!-- Login Form -->
<form class="w-full space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="block text-xs font-bold uppercase tracking-[0.1em] text-on-surface-variant px-1" for="email">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-primary/60 text-xl">alternate_email</span>
</div>
<input class="w-full h-14 bg-surface-container-low border-none rounded-xl pl-12 pr-4 text-on-surface placeholder:text-outline focus:ring-1 focus:ring-primary/30 focus:bg-surface-container transition-all shadow-[0_4px_12px_rgba(0,0,0,0.1)]" id="email" placeholder="voyager@tripmind.ai" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="block text-xs font-bold uppercase tracking-[0.1em] text-on-surface-variant" for="password">Password</label>
<a class="text-xs font-bold text-primary hover:text-primary-fixed-dim transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-primary/60 text-xl">lock</span>
</div>
<input class="w-full h-14 bg-surface-container-low border-none rounded-xl pl-12 pr-12 text-on-surface placeholder:text-outline focus:ring-1 focus:ring-primary/30 focus:bg-surface-container transition-all shadow-[0_4px_12px_rgba(0,0,0,0.1)]" id="password" placeholder="••••••••" type="password"/>
<div class="absolute inset-y-0 right-0 pr-4 flex items-center">
<span class="material-symbols-outlined text-on-surface-variant cursor-pointer hover:text-primary transition-colors">visibility_off</span>
</div>
</div>
</div>
<!-- Sign In Button -->
<button class="w-full h-14 bg-gradient-to-r from-primary to-primary-dim text-on-primary font-bold rounded-full shadow-[0_8px_32px_rgba(182,160,255,0.25)] hover:shadow-[0_8px_48px_rgba(182,160,255,0.35)] active:scale-95 transition-all flex items-center justify-center gap-2 group mt-4" type="submit">
                Sign In
                <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<!-- Social Login Divider -->
<div class="w-full flex items-center gap-4 my-10">
<div class="h-[1px] flex-1 bg-gradient-to-r from-transparent to-outline-variant/30"></div>
<span class="text-xs font-bold uppercase tracking-widest text-on-surface-variant">Or continue with</span>
<div class="h-[1px] flex-1 bg-gradient-to-l from-transparent to-outline-variant/30"></div>
</div>
<!-- Social Icons Grid -->
<div class="grid grid-cols-2 gap-4 w-full">
<button class="flex items-center justify-center h-14 rounded-2xl bg-surface-container-high hover:bg-surface-variant transition-colors border border-outline-variant/10 shadow-lg">
<div class="flex items-center gap-3">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M24 12.27c0-.85-.07-1.66-.21-2.45H12v4.63h6.72c-.29 1.57-1.18 2.89-2.52 3.79v3.15h4.08c2.39-2.21 3.76-5.46 3.76-9.12z" fill="#EA4335"></path>
<path d="M12 24c3.24 0 5.95-1.07 7.94-2.91l-4.08-3.15c-1.13.75-2.58 1.19-3.86 1.19-2.97 0-5.5-2-6.4-4.7H1.54v3.23C3.52 21.6 7.49 24 12 24z" fill="#FBBC05"></path>
<path d="M5.6 14.43c-.23-.69-.36-1.42-.36-2.18s.13-1.49.36-2.18V6.84H1.54C.56 8.79 0 10.33 0 12s.56 3.21 1.54 5.16l4.06-3.23z" fill="#34A853"></path>
<path d="M12 4.77c1.76 0 3.35.6 4.6 1.77l3.45-3.45C17.96 1.07 15.24 0 12 0 7.49 0 3.52 2.4 1.54 5.67l4.06 3.23c.9-2.7 3.43-4.13 6.4-4.13z" fill="#4285F4"></path>
</svg>
<span class="text-sm font-semibold text-on-surface">Google</span>
</div>
</button>
<button class="flex items-center justify-center h-14 rounded-2xl bg-surface-container-high hover:bg-surface-variant transition-colors border border-outline-variant/10 shadow-lg">
<div class="flex items-center gap-3">
<svg class="w-5 h-5 fill-on-surface" viewbox="0 0 24 24">
<path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.06.75 1.21-.02 2.1-.84 3.6-.72 1.58.12 2.76.71 3.51 1.73-3.04 1.74-2.55 5.65.45 6.84-.66 1.63-1.55 3.24-2.62 4.37zm-2.92-15.1c-.24-2.2 1.83-4.13 3.93-4.18.27 2.42-2.17 4.41-3.93 4.18z"></path>
</svg>
<span class="text-sm font-semibold text-on-surface">Apple</span>
</div>
</button>
</div>
<!-- Footer Action -->
<p class="mt-12 text-sm text-on-surface-variant font-medium">
            Don't have an account? 
            <a class="text-primary font-bold hover:underline" href="#">Sign up for free</a>
</p>
</main>
<!-- Bottom Navigation Suppression Check: 
         This is a transactional/focused screen. 
         No Navigation Shell or FAB will be rendered per protocol. 
    -->
</body></html>
