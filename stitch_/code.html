<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TripMind - AI Travel Concierge</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

            background-color: #0e0e13;
        }

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background text-on-surface min-h-screen flex flex-col overflow-hidden">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-transparent backdrop-blur-xl bg-opacity-60 dark:bg-zinc-950/60 shadow-[0_32px_48px_rgba(182,160,255,0.08)]">
<div class="flex justify-between items-center px-6 h-16 w-full max-w-7xl mx-auto">
<button class="text-zinc-400 hover:bg-zinc-800/50 transition-colors p-2 rounded-full active:scale-95 active:duration-100">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
<div class="text-2xl font-black bg-gradient-to-r from-[#b6a0ff] to-[#8596ff] bg-clip-text text-transparent font-['Plus_Jakarta_Sans'] tracking-tight">
                TripMind
            </div>
<div class="w-10 h-10 rounded-full overflow-hidden border border-outline-variant/15">
<img alt="User avatar" class="w-full h-full object-cover" data-alt="Close-up portrait of a stylish woman with soft cinematic lighting and a dark atmospheric background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAOKFw5r30S0ya-Gcx8g1KZbIXz0XV7-kJzKG9PqizwlLLWzxudgYFx1Oh1b84MlEm0it9UyWoqJkGZYQiTVINdatzkULYm9raBjy69P6VZRuRwXKAJ_qne7X5SFqUIbY0ixNmgjFAtZvCeehQfC3iv9azqHDLo2mHKMeQ5_p_VnctumAprWdSdyK48imC5u08qfHg_W66fQOnkDKc5MPdx3IT91DPTXAWY-43-xcF4i-3fFoerfrj9Ix4RBQ-yRyu3y5vULfESvzQ"/>
</div>
</div>
</header>
<!-- Main Canvas Area -->
<main class="flex-grow pt-20 pb-32 px-6 flex flex-col items-center max-w-2xl mx-auto w-full overflow-y-auto">
<!-- Welcome Message -->
<section class="mt-12 mb-12 text-center">
<div class="inline-block px-4 py-1.5 mb-6 rounded-full bg-secondary-container/40 text-primary text-xs font-bold uppercase tracking-widest">
                AI Concierge Active
            </div>
<h1 class="text-4xl font-extrabold tracking-tight mb-4 leading-tight">
                Where should we <br/>
<span class="text-primary">explore</span> next?
            </h1>
<p class="text-on-surface-variant max-w-xs mx-auto leading-relaxed">
                I'm your digital travel architect. Ask me anything about your next journey.
            </p>
</section>
<!-- Bento Suggestion Grid -->
<div class="grid grid-cols-2 gap-4 w-full">
<!-- Tokyo Card -->
<button class="group p-5 bg-surface-container-low rounded-3xl text-left hover:bg-surface-container transition-all duration-300 active:scale-95 flex flex-col h-40">
<div class="bg-primary/10 text-primary w-10 h-10 rounded-2xl flex items-center justify-center mb-auto group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined" data-icon="map">map</span>
</div>
<div>
<p class="text-xs text-on-surface-variant font-medium mb-1">Itinerary</p>
<p class="font-bold text-on-surface">Plan Tokyo trip</p>
</div>
</button>
<!-- Hotels Card -->
<button class="group p-5 bg-surface-container-low rounded-3xl text-left hover:bg-surface-container transition-all duration-300 active:scale-95 flex flex-col h-40">
<div class="bg-secondary/10 text-secondary w-10 h-10 rounded-2xl flex items-center justify-center mb-auto group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined" data-icon="bed">bed</span>
</div>
<div>
<p class="text-xs text-on-surface-variant font-medium mb-1">Stay</p>
<p class="font-bold text-on-surface">Recommend hotels</p>
</div>
</button>
<!-- Route Card -->
<button class="group p-5 bg-surface-container-low rounded-3xl text-left hover:bg-surface-container transition-all duration-300 active:scale-95 flex flex-col h-40">
<div class="bg-tertiary/10 text-tertiary-dim w-10 h-10 rounded-2xl flex items-center justify-center mb-auto group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined" data-icon="directions_car">directions_car</span>
</div>
<div>
<p class="text-xs text-on-surface-variant font-medium mb-1">Transport</p>
<p class="font-bold text-on-surface">Best drive route</p>
</div>
</button>
<!-- Budget Card -->
<button class="group p-5 bg-surface-container-low rounded-3xl text-left hover:bg-surface-container transition-all duration-300 active:scale-95 flex flex-col h-40">
<div class="bg-primary/10 text-primary w-10 h-10 rounded-2xl flex items-center justify-center mb-auto group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined" data-icon="payments">payments</span>
</div>
<div>
<p class="text-xs text-on-surface-variant font-medium mb-1">Finance</p>
<p class="font-bold text-on-surface">Control travel budget</p>
</div>
</button>
</div>
</main>
<!-- Bottom Message Input Area -->
<footer class="fixed bottom-0 left-0 w-full z-50 bg-zinc-950/80 backdrop-blur-2xl px-6 py-6 pb-8 shadow-[0_-8px_32px_rgba(0,0,0,0.5)] border-t border-white/5">
<div class="max-w-2xl mx-auto flex items-center gap-3">
<div class="flex-grow relative flex items-center">
<input class="w-full bg-surface-container-high border-none text-on-surface placeholder:text-zinc-500 rounded-3xl py-4 pl-6 pr-14 focus:ring-1 focus:ring-primary/30 transition-all text-sm font-medium" placeholder="Tell me about your dream destination..." type="text"/>
<button class="absolute right-2 w-10 h-10 bg-primary rounded-full flex items-center justify-center text-on-primary hover:bg-primary-dim active:scale-90 transition-all shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-[20px]" data-icon="send" style="font-variation-settings: 'FILL' 1;">send</span>
</button>
</div>
<button class="w-12 h-12 bg-surface-container-high flex items-center justify-center rounded-2xl text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="mic">mic</span>
</button>
</div>
</footer>
<!-- BottomNavBar (Hidden on main focused chat, following Shell Suppression Logic) -->
<!-- The BottomNavBar is suppressed to prioritize the task-focused chat interface -->
<!-- Navigation Drawer (Handle behavior) -->
<!-- Managed via leading icon in TopAppBar -->
</body></html>
